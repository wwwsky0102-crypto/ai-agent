name: Run Daily AI Agent

on:
  schedule:
    - cron: '27 6 * * *' # Runs at 6:27 AM UTC (12:12 PM Nepal Time)
  workflow_dispatch: # This adds the button so you can test it manually

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Upgraded to 3.11 for better performance and support

      - name: Install Requirements
        run: pip install -r requirements.txt

      - name: Run AI Agent Code
        env:
          YT_API_KEY: ${{ secrets.YT_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}         # <-- This is the crucial line for Hugging Face
          EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: python main.py
